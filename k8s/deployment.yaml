apiVersion: apps/v1
kind: Deployment
metadata:
  name: scaffold-nest
  labels:
    app: scaffold-nest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scaffold-nest
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: scaffold-nest
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: scaffold-nest
          image: scaffold-nest:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: scaffold-nest-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scaffold-nest-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: scaffold-nest-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: scaffold-nest-secrets
                  key: JWT_REFRESH_SECRET
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scaffold-nest-secrets
                  key: REDIS_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Allow in-flight requests to drain before shutdown
                command: ['/bin/sh', '-c', 'sleep 5']
